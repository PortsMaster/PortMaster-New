version: 1
kind: DeviceProfile
name: RisingDusk

# Dead zone para el Retroid Pocket Flip 2:
# El stick izquierdo reposa en ~-3300 (10% del rango) -> deadzone 0.15
# El stick derecho reposa en ~2200 (7%) -> deadzone 0.10
mapping:
- name: LeftTop
  source_event:
    gamepad:
      button: LeftTop
  target_events:
  - gamepad:
      button: LeftPaddle1
- name: RightTop
  source_event:
    gamepad:
      button: RightTop
  target_events:
  - gamepad:
      button: RightPaddle1
- name: Keyboard
  source_event:
    gamepad:
      button: Keyboard
  target_events:
  - gamepad:
      button: Guide
  - gamepad:
      button: North
- name: QuickAccess2
  source_event:
    gamepad:
      button: QuickAccess2
  target_events:
  - gamepad:
      button: Screenshot
- name: Left Stick Deadzone
  source_event:
    gamepad:
      axis:
        name: LeftStick
  target_events:
  - gamepad:
      axis:
        name: LeftStick
        deadzone: 0.15
- name: Right Stick Deadzone
  source_event:
    gamepad:
      axis:
        name: RightStick
  target_events:
  - gamepad:
      axis:
        name: RightStick
        deadzone: 0.10
