# The Wratch's Den — Steam build.
#
# Same engine as the itch/GOG build but recompiled — sugar::gfx::shader
# and sugar::gfx::newwin have shifted layout. The init_steam prologue
# and shutdown_input's controller-close cbz happen to be at identical
# symbol-relative offsets across builds, but everything else moved.
#
# Offsets here were derived from the Steam Mac build
# (the_wratchs_den @ 4,959,248 bytes). Use
# examples/sugar/tools/sugar_fingerprint.py to confirm a binary is
# this variant before shipping.
#
# Symbolic format: see machismo/src/patcher.h.

# --- Steam API ---
# sugar::steam::init_steam — skip Steam init. SteamAPI_Init is STUBbed
# (returns 0, treated as success), then ContextInit returns NULL and the
# caller crashes dereferencing it. Return false immediately instead.
at sym:__ZN5sugar5steam10init_steamEj     D2800000  ; expect D10183FF  # mov w0, #0
at sym:__ZN5sugar5steam10init_steamEj+4   ret       ; expect A90357F6

# --- gl4es compat (PowerVR GE8300, TrimUI Smart Pro) ---
# sugar::gfx::shader calls glBindFragDataLocation via __history[0xbc0]
# (itch used __cats[0x9e0] — different global, same slot semantics).
# glewContextInit populates the slot via dlsym(OpenGL.framework,
# "glBindFragDataLocation"); gl4es doesn't export the desktop-GL-3.0
# entry point, so dlsym returns NULL and the indirect `blr x8`
# segfaults. GLES 2 has a single fragment output bound to color 0, so
# the call is a semantic no-op — NOP the blr.
at sym:__ZN5sugar3gfx6shaderENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEE+0x16c   nop   ; expect D63F0100   # was blr x8

# --- Force shader-compile failure path on permissive Mali drivers (h700) ---
# Same motivation as the itch build (Mali lies about COMPILE_STATUS →
# realize_glenv crashes in _shader_flip). We force the error-log +
# SDL-fallback path to always be taken.
#
# newwin has two converging checks on _newshdr_t's errorOut pointer:
# a primary `cbz w8, success` after the SSO-cleanup tbz, and a
# secondary `cbnz w8, error-block` on the long-string-cleanup path.
# NOP the primary cbz and turn the secondary cbnz into an
# unconditional `b` so the error branch is always taken regardless of
# which SSO path the optimizer picked.
#
# shader() here only has the primary cbz — the Steam compiler collapsed
# the string-cleanup dual path into one, so there is no secondary
# cbnz shortcut to patch.
at sym:__ZN5sugar3gfx6newwinENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEEjjdS7_S7_S7_ib+0x25c   nop        ; expect 34000768  # was cbz w8, newwin+0x348
at sym:__ZN5sugar3gfx6newwinENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEEjjdS7_S7_S7_ib+0x344   17FFFFC7   ; expect 35FFF8E8  # was cbnz w8, newwin+0x260 → unconditional b
at sym:__ZN5sugar3gfx6shaderENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEE+0x41c                 nop        ; expect 34FFE188  # was cbz w8, shader+0x4c (loop back)

# --- SDL_GetDefaultAudioInfo bogus name pointer (ALSA backend) ---
# sugar::audio::init_audio calls SDL_GetDefaultAudioInfo(&name, &spec, 0)
# to label the output device. On the handheld's SDL 2.32 + ALSA
# backend, the out-param *name is non-NULL but garbage (observed
# 0x40) when the default device has no friendly name. The game only
# NULL-checks the pointer (cbz x20) before passing it to strlen, so
# strlen walks through unmapped memory and SIGSEGVs.
#
# Force the cbz into an unconditional `b` so the "no name" fallback is
# always taken — it builds a generic "device N" name from the index
# returned by SDL_GetNumAudioDevices. The itch build doesn't have this
# symbol referenced at all (SDL_GetDefaultAudioInfo was added later
# and only the Steam build calls it).
at sym:__ZN5sugar5audio10init_audioEdd+0x94   1400000D   ; expect B40001B4  # was cbz x20, +0x34 → unconditional b
# ...and later in init_audio, the cleanup path reads the same stale
# slot and calls SDL_free on it — cbz x0 lets 0x40 through because it's
# not NULL. Skip the SDL_free too. One string leak worst case (only
# triggered once during init).
at sym:__ZN5sugar5audio10init_audioEdd+0x958  14000002   ; expect B4000040  # was cbz x0, +0x8 → unconditional b (skip SDL_free(name))

# --- Shutdown ordering ---
# sugar::shutdown_sugar tears down Lua before sugar::input::shutdown_input,
# so the per-controller close loop calls call_lua_running("_ctrlr_disconnect",
# ...) and segfaults in lua_getfield with a freed lua_State. Patch the
# loop's leading `cbz x8, +0x20` into an unconditional `b +0x20` so the
# close-controller pass is always skipped. No explicit SDL close per
# controller, but the process is exiting — the OS reclaims them.
at sym:__ZN5sugar5input14shutdown_inputEv+0x64   14000008   ; expect B4000108  # b +0x20
