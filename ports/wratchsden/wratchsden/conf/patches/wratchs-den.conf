# The Wratch's Den / Scavenger of Dunomini — itch build.
#
# Offsets here target the itch.io Mac build. The Steam build was
# recompiled separately and several patch sites have shifted (notably
# sugar::gfx::shader and sugar::gfx::newwin). Run
# examples/sugar/tools/sugar_fingerprint.py on a binary to confirm
# which engine variant it is before applying this file; a non-itch
# fingerprint needs its own patch set.
#
# Scavenger of Dunomini's itch build is byte-identical to Wratch's Den
# itch at every patch site below — this file applies to both.
#
# Symbolic format: see machismo/src/patcher.h.

# --- Steam API ---
# sugar::steam::init_steam — skip Steam init. SteamAPI_Init is STUBbed
# (returns 0, treated as success), then ContextInit returns NULL and the
# caller crashes dereferencing it. Return false immediately instead.
at sym:__ZN5sugar5steam10init_steamEj     D2800000  ; expect D10183FF  # mov w0, #0
at sym:__ZN5sugar5steam10init_steamEj+4   ret       ; expect A90357F6

# --- gl4es compat (PowerVR GE8300, TrimUI Smart Pro) ---
# sugar::gfx::shader calls glBindFragDataLocation via __cats[0x9e0].
# glewContextInit populates the slot via dlsym(OpenGL.framework,
# "glBindFragDataLocation"); gl4es on this device doesn't export the
# desktop-GL-3.0 entry point, so dlsym returns NULL and the indirect
# `blr x8` segfaults. GLES 2 has a single fragment output bound to color 0,
# so the call is a semantic no-op — NOP the blr.
at sym:__ZN5sugar3gfx6shaderENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEE+0x138   nop   ; expect D63F0100   # was blr x8

# --- Force shader-compile failure path on permissive Mali drivers (h700) ---
# Sugar's stretch.shader uses GLSL ES 3.00 syntax (in/out/usampler2D).
# RK3326's Mali rejects it (COMPILE_STATUS=false) and the engine falls
# back to plain SDL rendering, which works. h700's Mali is more permissive
# and lies about COMPILE_STATUS, so the engine thinks the shader compiled
# and later crashes in _shader_flip when realize_glenv hits a NULL gl4es
# program.
#
# `_newshdr_t(window, name, bool* errorOut)` writes errorOut. Each caller
# has a primary `cbz w8, success` check and a secondary `cbnz w8, error`
# reached via a string-cleanup `tbnz` shortcut. NOP the cbz AND turn the
# cbnz into an unconditional branch so the error-log + SDL fallback path
# is always taken, regardless of which control path the optimizer picked
# at runtime.
at sym:__ZN5sugar3gfx6newwinENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEEjjdS7_S7_S7_ib+0x2f8   nop        ; expect 34000728  # was cbz w8, newwin+0x3dc
at sym:__ZN5sugar3gfx6newwinENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEEjjdS7_S7_S7_ib+0x3d8   17FFFFC9   ; expect 35FFF928  # was cbnz w8, newwin+0x2fc → unconditional b
at sym:__ZN5sugar3gfx6shaderENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEE+0x350                nop        ; expect 340018C8  # was cbz w8, shader+0x668
at sym:__ZN5sugar3gfx6shaderENSt3__112basic_stringIcNS1_11char_traitsIcEENS1_9allocatorIcEEEE+0x664                17FFFF3C   ; expect 35FFE788  # was cbnz w8, shader+0x354 → unconditional b

# --- Shutdown ordering ---
# sugar::shutdown_sugar tears down Lua before sugar::input::shutdown_input,
# so the per-controller close loop calls call_lua_running("_ctrlr_disconnect",
# ...) and segfaults in lua_getfield with a freed lua_State. Patch the
# loop's leading `cbz x8, +0x20` into an unconditional `b +0x20` so the
# close-controller pass is always skipped. No explicit SDL close per
# controller, but the process is exiting — the OS reclaims them.
at sym:__ZN5sugar5input14shutdown_inputEv+0x64   14000008   ; expect B4000108  # b +0x20
