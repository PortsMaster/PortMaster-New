# Mina the Hollower (Mac arm64 build) — instruction patches.
#
# ycGpuBuffer::Upload staging reclaim: force the $_1 (objc_release + free)
# path for EVERY buffer staging reclaim.
#
# The engine's Upload tail picks a reclaim job for the staging MTLBuffer:
#   tbnz w8, #1, $_0        ; m_flags bit 1 (streaming) -> $_0
#   $_1: release buffer + s_allocator->Free(node)      (balanced)
#   $_0: push node onto this->m_freeStagingBufHead      (recycle pool)
#
# The Linux build's ycGpuBuffer::Update POPS that free list for reuse; the
# MAC build's Update never does (verified at instruction level, 0x1001e8504:
# no flags test, no list walk — straight to a fresh newBufferWithLength per
# call). The Mac free list is WRITE-ONLY: every streaming-flagged staging
# buffer (TileLevelComponent ~1.25MB every ~2s, ycDrawUtil::Commit 16KB ~10/s,
# region buffers) accumulates forever — an engine leak the Linux port fixed,
# which macOS papers over with memory compression and 16GB, and which OOMs a
# 2GB handheld in under an hour (~26MB/min idle; proven by machismo heaptrack
# host-malloc traces 2026-06-09).
#
# NOPing the tbnz makes every reclaim take $_1. No perf loss: the reuse this
# disables never worked on Mac in the first place (nothing ever popped).
# Located by unique-pattern scan inside the function (survives address drift,
# aborts on zero or multiple hits); 370800e8 = tbnz w8, #1, +0x1c.
at sym:__ZN11ycGpuBuffer6UploadEPv find 370800e8  nop  ; expect 370800e8
