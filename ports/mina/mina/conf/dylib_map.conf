# Dylib mapping for Mina the Hollower (Gothic engine).
#
# Format: dylib_pattern = action
#   path/to/lib.so    — dlopen this Linux .so (relative to CWD = port dir)
#   STUB              — return 0/NULL for all symbols
#   SKIP              — leave symbols unresolved (crash if called)
# Patterns match by substring against the dylib basename; first match wins.
#
# IMPORTANT: the parser takes the ENTIRE text after '=' as the value — it does
# NOT strip trailing '#' comments. Keep comments on their own lines only.
#
# NOTE: SDL2 and the whole audio stack (ogg/vorbis/libsamplerate) are STATICALLY
# linked into the game binary — there are NO Mach-O game dylibs to load here.
# SDL2 is reached via the trampoline in machismo.conf; EGL/GLESv2 come from the
# device's Mali drivers (libgothic_patches links them directly).

# === System libraries ===
# Apple-ABI libc++ (alternate SSO + Darwin pthread padding). Pulls libc++abi.so.1
# and libatomic.so.1 from this same libs/ dir (on LD_LIBRARY_PATH).
libc++.1     = libs/libc++.so.1
libSystem.B  = libs/libsystem_shim.so

# libiconv: glibc has NO standalone libiconv.so.2. STUB for now; add a small
# libiconv_*→iconv_* shim only if the game actually calls it.
libiconv.2   = STUB

# Obj-C runtime → our minimal objc_msgSend (Metal-as-memory model). Lives in
# libgothic_patches.so (same .so as the engine detours). Symbols we don't export
# fall back to the resolver's return-0 stub, so this is a strict superset of STUB.
libobjc.A    = libs/libgothic_patches.so

# === Metal device creation (import redirect) ===
# Metal.framework's C entry MTLCreateSystemDefaultDevice binds to our .so (we
# create the EGL display + return a device sentinel). The rest of Metal's Obj-C
# surface goes through the libobjc map above; we replace every GPU consumer.
Metal        = libs/libgothic_patches.so

# === Proprietary (stub out) ===
libsteam_api = STUB

# === macOS frameworks (not needed — we replace the renderer with GLES) ===
Foundation     = SKIP
QuartzCore     = SKIP
AppKit         = SKIP
CoreFoundation = SKIP
CoreGraphics   = SKIP
CoreServices   = SKIP
CoreVideo      = SKIP
CoreAudio      = SKIP
AudioToolbox   = SKIP
CoreHaptics    = SKIP
GameController  = SKIP
ForceFeedback  = SKIP
IOKit          = SKIP
IOSurface      = SKIP
Carbon         = SKIP
Cocoa          = SKIP
Security       = SKIP
SystemConfiguration = SKIP
