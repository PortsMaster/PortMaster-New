# machismo configuration for Mina the Hollower (Gothic engine).
#
# Paths are relative to CWD, which the launch script sets to the port dir
# ($GAMEDIR). See gothic/PLAN.md §B and gothic/CLAUDE.md in the build repo.

[general]
dylib_map = conf/dylib_map.conf
# ycGpuBuffer::Upload staging reclaim → always $_1 (the Mac build's staging
# free list is write-only — an engine leak; see the patch file header).
patches = conf/patches/gothic.conf
# Early in-process KMS load splash: machismo modesets this PNG the instant it
# starts (covering the whole black-screen window, LSE patch included), then drops
# the DRM master so the game's renderer takes the display over. Replaces the old
# external splash binary the launcher used to background. See machismo splash_kms.c.
splash_image = splash.png

# SDL2 is statically linked in the game binary (~871 syms) → trampoline every
# _SDL_* call out to the device's native libSDL2 (KMSDRM + Mali GLES backend).
[trampoline.sdl2]
lib = libSDL2-2.0.so.0
prefix = _SDL_

# Steamworks: stub to return 0/NULL.
[trampoline.steam_noop]
lib = STUB
prefix = _SteamAPI_
prefix = _SteamInternal_

# Our GLES RHI backend. match_local=true lets the override pass detour the
# LOCAL/hidden-visibility engine RHI methods (ycRenderCmdList::Execute,
# ycRenderWindow::InitSwapChain, resource Init/Upload, ...), not just N_EXT.
[trampoline.gothic]
override_lib = libs/libgothic_patches.so
match_local = true
