# Machismo configuration for Spectrum Forces
#
# Paths are relative to CWD (set by launch script to the port directory).

[general]
dylib_map = conf/dylib_map.conf
patches = PATCHES_PATH

[trampoline.luajit]
lib = libluajit-5.1.so.2
prefix = _lua

# Sugar engine function replacements — mmap'd PCM cache for _mp3_fromfile.
# Stray Shot is SDL2, so no SDL3 _flip override.
# Cache files land in gamedata/pigments.app/Contents/MacOS/.machismo-pcm-cache/.
[trampoline.game]
override_lib = libs/libsugar_patches_sdl2.so
